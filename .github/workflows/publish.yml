name: Publish to Modrinth

# Se déclenche automatiquement quand tu crées un tag commençant par "v" (ex: v0.1.0, v1.0.0)
# Pour publier : git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Download gradle-wrapper.jar if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -sSL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.10.0/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Build PUBLIC variant
        run: ./gradlew build --stacktrace

      - name: Stash public JAR
        run: |
          mkdir -p release-artifacts
          cp build/libs/*.jar release-artifacts/

      - name: Publish PUBLIC to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew publishMods --stacktrace

      - name: Build DEBUG variant (for GitHub release only)
        run: ./gradlew clean build -PbuildType=debug --stacktrace

      - name: Stash debug JAR
        run: cp build/libs/*.jar release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-artifacts/*.jar
          body_path: CHANGELOG.md
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
